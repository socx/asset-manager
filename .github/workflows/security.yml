name: Security

on:
  schedule:
    - cron: '0 7 * * 1'   # every Monday at 07:00 UTC
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── npm audit ────────────────────────────────────────────────────────────────
  audit:
    name: npm audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fail the job on high or critical severity vulnerabilities
      - name: Run npm audit
        run: npm audit --audit-level=high

  # ── Trivy image scan ─────────────────────────────────────────────────────────
  # Build the API image locally and scan with Trivy.
  # Runs on push to main and on the weekly schedule; skipped on PRs to keep them fast.
  trivy:
    name: Trivy image scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'schedule'

    permissions:
      contents: read
      security-events: write   # upload SARIF to GitHub Advanced Security

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (scan only — not pushed)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          load: true
          tags: asset-manager-api:scan
          cache-from: type=gha

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:        asset-manager-api:scan
          format:           sarif
          output:           trivy-results.sarif
          severity:         CRITICAL,HIGH
          exit-code:        '1'
          ignore-unfixed:   true

      - name: Upload Trivy results to GitHub Advanced Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  # ── Dependency review ─────────────────────────────────────────────────────────
  # Compares new dependencies introduced in a PR against known vulnerability databases.
  # Runs on PRs only.
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Run Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
